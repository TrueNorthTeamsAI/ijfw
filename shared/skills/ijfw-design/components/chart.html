<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Charts -- IJFW Design</title>
<style>
:root{--color-primary:#2563EB;--color-fg:#1E293B;--color-card:#FFFFFF;--color-muted:#E2E8F0;
  --color-border:#CBD5E1;--color-bg:#F8FAFC;--radius:8px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.12);--transition:200ms ease}
@media(prefers-color-scheme:dark){:root{--color-bg:#0F172A;--color-fg:#F1F5F9;--color-card:#1E293B;--color-muted:#334155;--color-border:#475569}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--color-bg);color:var(--color-fg);padding:2rem;line-height:1.5}
h1{font-size:1.25rem;font-weight:700;margin-bottom:1.5rem}
h2{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;opacity:.55;font-weight:600;margin:2rem 0 .75rem}
.chart-row{display:flex;flex-wrap:wrap;gap:2rem;align-items:flex-start;margin-bottom:2rem}
figure{background:var(--color-card);border:1px solid var(--color-border);border-radius:var(--radius);
  padding:1.25rem;box-shadow:var(--shadow-sm)}
figcaption{font-size:.8125rem;font-weight:500;opacity:.65;margin-bottom:.75rem}
</style>
</head>
<body>
<h1>Charts (pure SVG, zero deps)</h1>

<h2>Line chart</h2>
<div class="chart-row">
<figure aria-label="Line chart: sample trend">
  <figcaption>Trend -- last 10 periods</figcaption>
  <svg id="line-chart" width="340" height="140" role="img" aria-describedby="line-desc" style="overflow:visible">
    <title id="line-desc">Line chart showing upward trend from 40 to 95</title>
  </svg>
</figure>

<figure aria-label="Bar chart: weekly activity">
  <figcaption>Weekly Activity</figcaption>
  <svg id="bar-chart" width="280" height="140" role="img" aria-describedby="bar-desc">
    <title id="bar-desc">Bar chart showing weekly activity Mon through Sun</title>
  </svg>
</figure>

<figure aria-label="Sparkline" style="padding:.875rem 1.25rem">
  <figcaption>Sparkline</figcaption>
  <svg id="sparkline" width="120" height="40" role="img" style="overflow:visible"></svg>
</figure>
</div>

<script>
(function(){
  // Line chart
  var pts=[40,65,52,78,60,85,72,91,68,95];
  var w=340,h=140,pad=20;
  var xStep=(w-pad*2)/(pts.length-1);
  var yMin=30,yMax=100;
  function sc(v){return h-pad-((v-yMin)/(yMax-yMin))*(h-pad*2);}
  var polyline=pts.map(function(v,i){return (pad+i*xStep)+','+sc(v);}).join(' ');
  var svg=document.getElementById('line-chart');
  // grid lines
  [40,60,80,100].forEach(function(v){
    var y=sc(v);
    var line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',pad);line.setAttribute('y1',y);line.setAttribute('x2',w-pad);line.setAttribute('y2',y);
    line.setAttribute('stroke','currentColor');line.setAttribute('stroke-opacity','0.1');line.setAttribute('stroke-width','1');
    svg.appendChild(line);
    var txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',pad-4);txt.setAttribute('y',y+4);txt.setAttribute('text-anchor','end');
    txt.setAttribute('font-size','9');txt.setAttribute('fill','currentColor');txt.setAttribute('opacity','0.5');
    txt.textContent=v;svg.appendChild(txt);
  });
  // fill area
  var fill=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  var fillPts=pts.map(function(v,i){return (pad+i*xStep)+','+sc(v);}).join(' ')+
    ' '+(pad+(pts.length-1)*xStep)+','+(h-pad)+' '+pad+','+(h-pad);
  fill.setAttribute('points',fillPts);
  fill.setAttribute('fill','var(--color-primary)');fill.setAttribute('opacity','0.08');
  svg.appendChild(fill);
  // line
  var poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  poly.setAttribute('fill','none');poly.setAttribute('stroke','var(--color-primary)');
  poly.setAttribute('stroke-width','2.5');poly.setAttribute('stroke-linecap','round');
  poly.setAttribute('stroke-linejoin','round');poly.setAttribute('points',polyline);
  svg.appendChild(poly);
  // dots
  pts.forEach(function(v,i){
    var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',pad+i*xStep);c.setAttribute('cy',sc(v));c.setAttribute('r','4');
    c.setAttribute('fill','var(--color-primary)');
    svg.appendChild(c);
  });

  // Bar chart
  var bars=[{l:'Mon',v:60},{l:'Tue',v:80},{l:'Wed',v:55},{l:'Thu',v:90},{l:'Fri',v:75},{l:'Sat',v:40},{l:'Sun',v:30}];
  var bw=28,bg=8,bpad=20,bh=140,maxV=100;
  var bsvg=document.getElementById('bar-chart');
  bars.forEach(function(b,i){
    var bHeight=((b.v/maxV)*(bh-bpad*2));
    var x=bpad+i*(bw+bg);
    var y=bh-bpad-bHeight;
    var rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',x);rect.setAttribute('y',y);rect.setAttribute('width',bw);rect.setAttribute('height',bHeight);
    rect.setAttribute('rx','3');rect.setAttribute('fill','var(--color-primary)');
    rect.setAttribute('opacity',0.6+(b.v/maxV)*0.4);
    rect.setAttribute('aria-label',b.l+': '+b.v);
    bsvg.appendChild(rect);
    var txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',x+bw/2);txt.setAttribute('y',bh-4);txt.setAttribute('text-anchor','middle');
    txt.setAttribute('font-size','9');txt.setAttribute('fill','currentColor');txt.setAttribute('opacity','0.7');
    txt.textContent=b.l;bsvg.appendChild(txt);
  });

  // Sparkline
  var spts=[10,25,18,35,22,40,30,45,38,50];
  var sw=120,sh=40,spad=4;
  var sxStep=(sw-spad*2)/(spts.length-1);
  var syMin=8,syMax=52;
  function ssc(v){return sh-spad-((v-syMin)/(syMax-syMin))*(sh-spad*2);}
  var spoly=spts.map(function(v,i){return (spad+i*sxStep)+','+ssc(v);}).join(' ');
  var ssvg=document.getElementById('sparkline');
  var sl=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  sl.setAttribute('fill','none');sl.setAttribute('stroke','var(--color-primary)');
  sl.setAttribute('stroke-width','1.5');sl.setAttribute('stroke-linecap','round');
  sl.setAttribute('stroke-linejoin','round');sl.setAttribute('points',spoly);
  ssvg.appendChild(sl);
  var sc2=document.createElementNS('http://www.w3.org/2000/svg','circle');
  sc2.setAttribute('cx',spad+(spts.length-1)*sxStep);sc2.setAttribute('cy',ssc(spts[spts.length-1]));
  sc2.setAttribute('r','3');sc2.setAttribute('fill','var(--color-primary)');ssvg.appendChild(sc2);
})();
</script>
</body>
</html>
